<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fichada — Icono &amp; favicon</title>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root { --ink:#1b1b19; --ink2:#54534f; --ink3:#8a8984; --line:#e7e7e3; }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: 'Hanken Grotesk', system-ui, sans-serif; color: var(--ink);
    background: #f4f4f1; padding: 48px 40px 64px; }
  h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; margin: 0 0 4px; }
  .sub { color: var(--ink3); font-size: 14px; margin: 0 0 36px; }
  .row { display: flex; gap: 40px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 40px; }
  .card { background: #fff; border: 1px solid var(--line); border-radius: 20px; padding: 28px 32px;
    box-shadow: 0 1px 2px rgba(0,0,0,.04); }
  .eyebrow { font-size: 11px; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: var(--ink3); margin: 0 0 18px; }
  .sizes { display: flex; gap: 30px; align-items: flex-end; }
  .sz { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .sz span { font-size: 12px; color: var(--ink3); font-variant-numeric: tabular-nums; }
  .ico { display: block; }
  /* homescreen mock */
  .home { width: 260px; border-radius: 30px; padding: 26px 24px;
    background: linear-gradient(160deg,#cfd6e6,#aab4cc); }
  .apps { display: grid; grid-template-columns: repeat(4,1fr); gap: 18px 14px; }
  .app { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .app .tile { width: 50px; height: 50px; border-radius: 13px; box-shadow: 0 3px 8px rgba(0,0,0,.18); }
  .app .lbl { font-size: 10px; color: #1c2436; font-weight: 600; }
  .ghost { background: rgba(255,255,255,.32); }
  /* browser tab mock */
  .tab { display: inline-flex; align-items: center; gap: 9px; background: #fff; border: 1px solid var(--line);
    border-radius: 11px 11px 0 0; padding: 9px 16px 11px; font-size: 13px; font-weight: 500; box-shadow: 0 -1px 3px rgba(0,0,0,.04); }
  .tab img { display: block; border-radius: 4px; }
  .mono { font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <h1>Fichada — Icono &amp; favicon</h1>
  <p class="sub">Marca: la “F” como agujas de reloj sobre un arco de jornada cumplida. Paleta sobria, acento azul.</p>

  <div class="card" style="margin-bottom:32px;">
    <p class="eyebrow">App icon · escala</p>
    <div class="sizes">
      <div class="sz"><img class="ico" id="i192" src="icon.svg" width="180" height="180" alt=""><span>180 / 192</span></div>
      <div class="sz"><img class="ico" src="icon.svg" width="120" height="120" alt=""><span>120</span></div>
      <div class="sz"><img class="ico" src="icon.svg" width="76" height="76" alt=""><span>76</span></div>
      <div class="sz"><img class="ico" src="icon.svg" width="48" height="48" alt=""><span>48</span></div>
      <div class="sz"><img class="ico" src="favicon-mark.svg" width="32" height="32" alt=""><span>32</span></div>
      <div class="sz"><img class="ico" src="favicon-mark.svg" width="16" height="16" alt=""><span>16</span></div>
    </div>
  </div>

  <div class="row">
    <div class="card">
      <p class="eyebrow">En la pantalla de inicio</p>
      <div class="home">
        <div class="apps">
          <div class="app"><div class="tile ghost"></div><div class="lbl">&nbsp;</div></div>
          <div class="app"><div class="tile ghost"></div><div class="lbl">&nbsp;</div></div>
          <div class="app"><img class="tile" src="icon.svg" alt=""><div class="lbl">Fichada</div></div>
          <div class="app"><div class="tile ghost"></div><div class="lbl">&nbsp;</div></div>
          <div class="app"><div class="tile ghost"></div><div class="lbl">&nbsp;</div></div>
          <div class="app"><div class="tile ghost"></div><div class="lbl">&nbsp;</div></div>
          <div class="app"><div class="tile ghost"></div><div class="lbl">&nbsp;</div></div>
          <div class="app"><div class="tile ghost"></div><div class="lbl">&nbsp;</div></div>
        </div>
      </div>
    </div>

    <div class="card" style="align-self:stretch; display:flex; flex-direction:column; justify-content:flex-end;">
      <p class="eyebrow">Favicon · pestaña del navegador</p>
      <div style="display:flex; align-items:flex-end; gap:0; padding-top:30px; background:linear-gradient(#eceae6,#fff); border-radius:10px 10px 0 0;">
        <div class="tab"><img src="favicon-mark.svg" width="16" height="16" alt=""> Fichada — Panel</div>
        <div class="tab" style="opacity:.55; background:#f3f3f0;"><img src="favicon-mark.svg" width="16" height="16" alt=""> Reportes</div>
      </div>
    </div>
  </div>
</body>
</html>
